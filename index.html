<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Azure AI Translator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <h1 class="title">⚡ FUTURE TRANSLATOR</h1>

    <div class="card">
        <input type="text" id="apiKey" placeholder="Azure API Key">
        <input type="text" id="region" placeholder="Region (e.g. eastus)">

        <textarea id="inputText" placeholder="Type something..."></textarea>

        <select id="targetLang">
            <option value="hi">Hindi</option>
            <option value="en">English</option>
            <option value="fr">French</option>
            <option value="es">Spanish</option>
        </select>

        <button onclick="translateText()">🚀 Translate</button>

        <div id="loader" class="loader hidden"></div>
        <div id="outputText" class="output"></div>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
